<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SeismoWatch — Live Claim Game</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #ff4d1a;
  --green:  #4dff91;
  --dim:    #555;
  --border: #1e1e2e;
  --bg0:    #08080e;
  --bg1:    #0c0c14;
  --bg2:    #101018;
  --text:   #e8e4d0;
}

html, body {
  height: 100%;
  background: var(--bg0);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
}
body { display: flex; flex-direction: column; min-height: 100vh; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 24px;
  background: var(--bg1); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-title { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--red); }
.brand-sub   { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-top: 2px; }

.live-pill {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--green);
  border: 1px solid #1a3a1a; border-radius: 20px; padding: 5px 12px; background: #0a1a0a;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 1.3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);} }

/* USER BAR */
.user-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 24px; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.user-bar label { font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; white-space: nowrap; }
.user-bar input {
  background: #13131e; border: 1px solid var(--border); border-radius: 4px; color: var(--text);
  padding: 6px 12px; font-family: 'Share Tech Mono', monospace; font-size: 13px; width: 170px; transition: border-color .2s;
}
.user-bar input:focus { outline: none; border-color: var(--red); }
.score-pill {
  margin-left: auto; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--green);
  border: 1px solid #1a3a1a; border-radius: 4px; padding: 4px 12px; background: #0a1a0a; white-space: nowrap;
}
.score-pill span { color: var(--text); }

/* MAIN */
main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* LIVE STAGE */
.live-stage {
  flex-shrink: 0; padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border); background: var(--bg0);
}
.stage-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.stage-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* big live card */
.live-card {
  border: 1px solid var(--border); border-radius: 8px; background: var(--bg2);
  display: flex; align-items: center; gap: 20px; padding: 18px 20px;
  position: relative; overflow: hidden; transition: border-color .4s;
}
.live-card.unclaimed { border-color: var(--red); }
.live-card.unclaimed::before {
  content:''; position:absolute; inset:0; border-radius:8px; pointer-events:none;
  animation: glow 2s ease-in-out infinite;
}
@keyframes glow {
  0%,100%{box-shadow:inset 0 0 0 1px rgba(255,77,26,.1);}
  50%{box-shadow:inset 0 0 0 1px rgba(255,77,26,.45);}
}
.live-card.just-arrived { animation: slam-in .45s cubic-bezier(.22,.9,.35,1) both; }
@keyframes slam-in { from{transform:translateY(-18px) scale(.97);opacity:0;} to{transform:translateY(0) scale(1);opacity:1;} }

.big-mag {
  min-width: 80px; height: 80px; border-radius: 6px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-width: 1px; border-style: solid;
}
.big-mag .num  { font-size: 34px; font-weight: 900; line-height: 1; }
.big-mag .unit { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: .7; margin-top: 3px; }

.live-info { flex: 1; min-width: 0; }
.live-place { font-size: 22px; font-weight: 700; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
.live-meta {
  font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); margin-top: 6px;
  display: flex; flex-wrap: wrap; gap: 10px;
}
.live-meta a { color: #3a3a7a; text-decoration: none; }
.live-meta a:hover { color: #7a7aff; }

.live-action { flex-shrink: 0; text-align: center; min-width: 120px; }
.btn-claim {
  display: block; width: 100%; background: var(--red); color: #fff; border: none;
  border-radius: 5px; padding: 12px 0;
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; transition: background .15s, transform .1s;
}
.btn-claim:hover  { background: #ff6540; }
.btn-claim:active { transform: scale(.96); }

.claimed-badge { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); text-align: center; }
.claimed-who { font-size: 15px; font-weight: 700; margin-top: 3px; letter-spacing: .5px; color: var(--green); }
.claimed-who.other { color: #aaa; }

/* waiting */
.waiting-card {
  border: 1px dashed #1e1e2e; border-radius: 8px; padding: 36px 20px; text-align: center;
  font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #333; letter-spacing: 2px; line-height: 2.2;
}
.seismo-wave { display: flex; justify-content: center; margin-top: 12px; }
.seismo-wave svg { overflow: visible; }
.wave-path { animation: wave-scroll 2s linear infinite; }
@keyframes wave-scroll { from{stroke-dashoffset:0;}to{stroke-dashoffset:-60;} }

/* HISTORY */
.history-section { flex: 1; overflow-y: auto; padding: 12px 24px 16px; }
.history-section::-webkit-scrollbar { width: 4px; }
.history-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.history-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.history-label::after { content:''; flex:1; height:1px; background:var(--border); }
.history-list { display: flex; flex-direction: column; gap: 5px; }

.hist-row {
  display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 5px;
  border: 1px solid var(--border); background: var(--bg2); font-size: 14px; opacity: .8; transition: opacity .2s;
}
.hist-row:hover { opacity: 1; }

.hist-mag {
  min-width: 44px; height: 38px; border-radius: 4px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-width: 1px; border-style: solid;
}
.hist-mag .n { font-size: 16px; font-weight: 900; line-height: 1; }
.hist-mag .u { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; opacity: .6; }

.hist-info { flex: 1; min-width: 0; }
.hist-place { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-time  { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 2px; }

.hist-claim { font-family: 'Share Tech Mono', monospace; font-size: 11px; text-align: right; flex-shrink: 0; }
.hist-claim .tag { color: var(--dim); font-size: 10px; letter-spacing: 1px; }
.hist-claim .who { font-size: 13px; font-weight: 700; margin-top: 1px; }
.hist-claim.mine  .who { color: var(--green); }
.hist-claim.other .who { color: #999; }
.hist-claim.missed .who { color: #333; font-style: italic; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  border-radius: 6px; padding: 10px 22px;
  font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 1px;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* FOOTER */
footer {
  border-top: 1px solid var(--border); padding: 7px 24px;
  font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #2a2a3a;
  display: flex; justify-content: space-between; flex-shrink: 0;
}
footer a { color: #3a3a5a; text-decoration: none; }
footer a:hover { color: #8888cc; }
#poll-status { color: #3a3a5a; }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand-title">⚡ SeismoWatch</div>
    <div class="brand-sub">Live Earthquake Claim Game · USGS Real-Time Feed</div>
  </div>
  <div class="live-pill"><div class="dot"></div>USGS LIVE</div>
</header>

<div class="user-bar">
  <label>Your callsign</label>
  <input id="username" type="text" maxlength="18" placeholder="Enter name to claim…" autocomplete="off" />
  <div class="score-pill">Score: <span id="my-score">0</span></div>
</div>

<main>
  <div class="live-stage">
    <div class="stage-label">⬤ Current event — unclaimed</div>
    <div id="live-slot">
      <div class="waiting-card">
        <div>Contacting USGS…</div>
        <div class="seismo-wave">
          <svg width="220" height="32" viewBox="0 0 220 32" fill="none">
            <path class="wave-path" stroke="#ff4d1a" stroke-width="1.5" stroke-dasharray="6 4"
              d="M0,16 L20,16 L25,6 L30,26 L35,4 L42,28 L47,16 L60,16
                 L65,10 L70,22 L74,16 L90,16 L95,8 L100,24 L104,14
                 L108,20 L112,16 L130,16 L135,6 L140,26 L145,16 L160,16
                 L165,10 L170,22 L174,16 L190,16 L195,8 L200,24 L204,16 L220,16"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-label">Recent events</div>
    <div class="history-list" id="history-list">
      <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#333;letter-spacing:2px;padding:16px 0;text-align:center">No history yet</div>
    </div>
  </div>
</main>

<footer>
  <span>Data: <a href="https://earthquake.usgs.gov" target="_blank">USGS Earthquake Hazards Program</a> · One claim per event · First click wins</span>
  <span id="poll-status">Connecting…</span>
</footer>

<div class="toast" id="toast"></div>

<script>
// CONFIG
const USGS_RAW   = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson';
const POLL_MS    = 30000;
const CLAIMS_KEY = 'seismo_claims_v4';
const USER_KEY   = 'seismo_user_v4';
const HIST_KEY   = 'seismo_history_v4';

const PROXIES = [
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
];
let proxyIdx = 0;

// STATE
let username = localStorage.getItem(USER_KEY) || '';
let claims   = {};     // { usgs_id: claimer_name }
let history  = [];     // [{ eq, claimedBy }]  newest first
let liveEq   = null;   // currently displayed live event
let seenIds  = new Set();
let cdHandle = null;
let countdown = 0;

// STORAGE
function loadStorage() {
  try { claims  = JSON.parse(localStorage.getItem(CLAIMS_KEY) || '{}'); } catch(e) { claims = {}; }
  try { history = JSON.parse(localStorage.getItem(HIST_KEY)   || '[]'); } catch(e) { history = []; }
  history.forEach(h => seenIds.add(h.eq.id));
  Object.keys(claims).forEach(id => seenIds.add(id));
}

function saveStorage() {
  localStorage.setItem(CLAIMS_KEY, JSON.stringify(claims));
  localStorage.setItem(HIST_KEY,   JSON.stringify(history.slice(0, 50)));
}

// USGS
async function fetchUsgs() {
  for (let i = 0; i < PROXIES.length; i++) {
    const idx = (proxyIdx + i) % PROXIES.length;
    try {
      const res = await fetch(PROXIES[idx](USGS_RAW), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      proxyIdx = idx;
      return json.features.map(f => ({
        id:    f.id,
        place: f.properties.place || 'Unknown location',
        mag:   +(f.properties.mag ?? 0),
        depth: +(f.geometry.coordinates[2] ?? 0),
        lat:   +f.geometry.coordinates[1],
        lon:   +f.geometry.coordinates[0],
        time:  f.properties.time,
        url:   f.properties.url || null,
      }));
    } catch(e) { console.warn('Proxy', idx, 'failed:', e.message); }
  }
  throw new Error('All proxies failed');
}

// COLORS
function magStyle(m) {
  if (m < 2)   return { bg:'#0d1f0d', txt:'#4dff91', bdr:'#1a3a1a' };
  if (m < 3.5) return { bg:'#1c1f06', txt:'#d4e84d', bdr:'#363810' };
  if (m < 5)   return { bg:'#281a05', txt:'#ffd94d', bdr:'#483210' };
  if (m < 6.5) return { bg:'#281205', txt:'#ff9933', bdr:'#482010' };
  return              { bg:'#280505', txt:'#ff4d1a', bdr:'#480e0e' };
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// RENDER LIVE
function renderLive(animate) {
  const slot = document.getElementById('live-slot');
  const label = document.querySelector('.stage-label');

  if (!liveEq) {
    label.textContent = '⬤ Waiting for next event…';
    slot.innerHTML = `
      <div class="waiting-card">
        <div>Monitoring seismic activity…</div>
        <div style="font-size:11px;color:#3a3a3a;margin-top:4px">Next check in <span id="cd-inline">${countdown}s</span></div>
        <div class="seismo-wave">
          <svg width="220" height="32" viewBox="0 0 220 32" fill="none">
            <path class="wave-path" stroke="#ff4d1a" stroke-width="1.5" stroke-dasharray="6 4"
              d="M0,16 L20,16 L25,6 L30,26 L35,4 L42,28 L47,16 L60,16
                 L65,10 L70,22 L74,16 L90,16 L95,8 L100,24 L104,14
                 L108,20 L112,16 L130,16 L135,6 L140,26 L145,16 L160,16
                 L165,10 L170,22 L174,16 L190,16 L195,8 L200,24 L204,16 L220,16"/>
          </svg>
        </div>
      </div>`;
    return;
  }

  const eq        = liveEq;
  const st        = magStyle(eq.mag);
  const claimedBy = claims[eq.id] || null;
  const isMine    = claimedBy === username;
  const unclaimed = !claimedBy;

  label.textContent = unclaimed ? '⬤ Current event — unclaimed' : '⬤ Current event';

  slot.innerHTML = `
    <div class="live-card ${unclaimed ? 'unclaimed' : ''} ${animate ? 'just-arrived' : ''}">
      <div class="big-mag" style="background:${st.bg};color:${st.txt};border-color:${st.bdr}">
        <div class="num">${eq.mag.toFixed(1)}</div>
        <div class="unit">mag</div>
      </div>
      <div class="live-info">
        <div class="live-place" title="${esc(eq.place)}">${esc(eq.place)}</div>
        <div class="live-meta">
          <span>⏱ ${timeAgo(eq.time)}</span>
          <span>📍 ${eq.lat.toFixed(2)}°, ${eq.lon.toFixed(2)}°</span>
          <span>⬇ ${eq.depth.toFixed(1)} km depth</span>
          ${eq.url ? '<span><a href="' + eq.url + '" target="_blank">USGS report ↗</a></span>' : ''}
        </div>
      </div>
      <div class="live-action">
        ${unclaimed
          ? '<button class="btn-claim" onclick="claimLive()">CLAIM</button><div style="font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--dim);margin-top:6px">First click wins</div>'
          : '<div class="claimed-badge">CLAIMED BY</div><div class="claimed-who ' + (isMine ? '' : 'other') + '">' + esc(claimedBy) + '</div>'
        }
      </div>
    </div>`;
}

// RENDER HISTORY
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:#333;letter-spacing:2px;padding:16px 0;text-align:center">No history yet</div>';
    return;
  }
  list.innerHTML = history.slice(0, 40).map(h => {
    const eq = h.eq;
    const st = magStyle(eq.mag);
    const claimedBy  = h.claimedBy;
    const isMine     = claimedBy && claimedBy === username;
    const claimClass = claimedBy ? (isMine ? 'mine' : 'other') : 'missed';
    return `
      <div class="hist-row">
        <div class="hist-mag" style="background:${st.bg};color:${st.txt};border-color:${st.bdr}">
          <div class="n">${eq.mag.toFixed(1)}</div>
          <div class="u">mag</div>
        </div>
        <div class="hist-info">
          <div class="hist-place" title="${esc(eq.place)}">${esc(eq.place)}</div>
          <div class="hist-time">${timeAgo(eq.time)} · ${eq.depth.toFixed(0)} km depth</div>
        </div>
        <div class="hist-claim ${claimClass}">
          <div class="tag">${claimedBy ? 'CLAIMED' : 'MISSED'}</div>
          <div class="who">${esc(claimedBy || 'unclaimed')}</div>
        </div>
      </div>`;
  }).join('');
}

function updateScore() {
  const mine = Object.values(claims).filter(n => n === username).length;
  document.getElementById('my-score').textContent = mine;
}

// CLAIM
window.claimLive = function() {
  if (!liveEq) return;
  if (!username) {
    const inp = document.getElementById('username');
    inp.focus(); inp.style.borderColor = 'var(--red)';
    setTimeout(() => inp.style.borderColor = '', 1400);
    showToast('⚠ Set a callsign first!', '#ff8080', '#2a0808', '#4a1010');
    return;
  }
  // re-check in case someone else claimed it
  loadStorage();
  if (claims[liveEq.id]) {
    showToast('Already claimed by ' + claims[liveEq.id] + '!', '#ff8080', '#2a0808', '#4a1010');
    renderLive(false);
    return;
  }
  claims[liveEq.id] = username;
  // update history entry
  const h = history.find(x => x.eq.id === liveEq.id);
  if (h) h.claimedBy = username;
  saveStorage();
  showToast('✔ Claimed M' + liveEq.mag.toFixed(1) + ' — ' + liveEq.place);
  renderLive(false);
  updateScore();
  renderHistory();
};

// PROMOTE NEW EQ TO LIVE STAGE
function promoteLive(eq, animate) {
  // archive current live eq to history (if not already there)
  if (liveEq && !history.find(h => h.eq.id === liveEq.id)) {
    history.unshift({ eq: liveEq, claimedBy: claims[liveEq.id] || null });
    history.sort((a, b) => b.eq.time - a.eq.time);
  }
  seenIds.add(eq.id);
  liveEq = eq;
  // make sure history has a placeholder for it too
  if (!history.find(h => h.eq.id === eq.id)) {
    history.unshift({ eq, claimedBy: null });
    history.sort((a, b) => b.eq.time - a.eq.time);
  }
  saveStorage();
  renderLive(animate);
  renderHistory();
  updateScore();
}

// POLL
async function poll() {
  document.getElementById('poll-status').textContent = 'Fetching USGS…';
  try {
    const eqs = await fetchUsgs();
    eqs.sort((a, b) => b.time - a.time);

    const fresh = eqs.filter(e => !seenIds.has(e.id));

    if (fresh.length > 0) {
      // newest unseen becomes the live event
      promoteLive(fresh[0], true);
      showToast('⚡ New M' + fresh[0].mag.toFixed(1) + ' — ' + fresh[0].place);

      // rest are silently added to history as missed
      fresh.slice(1).forEach(eq => {
        seenIds.add(eq.id);
        if (!history.find(h => h.eq.id === eq.id)) {
          history.push({ eq, claimedBy: null });
        }
      });
      history.sort((a, b) => b.eq.time - a.eq.time);
      saveStorage();
      renderHistory();
    } else if (!liveEq && eqs.length > 0) {
      // first load: show the most recent event
      promoteLive(eqs[0], true);
    }

    startCountdown(POLL_MS / 1000);
    document.getElementById('poll-status').textContent = 'Next check in ' + Math.round(POLL_MS / 1000) + 's';

  } catch(err) {
    console.error('SeismoWatch poll error:', err);
    document.getElementById('poll-status').textContent = '⚠ Proxy failed — retrying in ' + Math.round(POLL_MS / 1000) + 's';
    startCountdown(POLL_MS / 1000);
  }
}

function startCountdown(secs) {
  countdown = Math.round(secs);
  clearInterval(cdHandle);
  cdHandle = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    document.getElementById('poll-status').textContent = 'Next check in ' + countdown + 's';
    const el = document.getElementById('cd-inline');
    if (el) el.textContent = countdown + 's';
  }, 1000);
}

// TOAST
let toastTimer;
function showToast(msg, color, bg, bdr) {
  color = color || 'var(--green)'; bg = bg || '#0d2a0d'; bdr = bdr || '#1a4a1a';
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.color = color; t.style.background = bg; t.style.borderColor = bdr;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// INIT
document.getElementById('username').value = username;
document.getElementById('username').addEventListener('input', function(e) {
  username = e.target.value.trim();
  localStorage.setItem(USER_KEY, username);
  updateScore(); renderLive(false); renderHistory();
});

loadStorage();
updateScore();
renderLive(false);
renderHistory();
poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
